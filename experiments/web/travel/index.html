<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packing Checklist</title>
    <meta name="description" content="Interactive packing checklist with tag filtering, search, and progress tracking.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css?v=20260404-1">
    <script defer src="./app.js?v=20260404-1"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body>
<div class="container" x-data="travelChecklistApp()" x-cloak>

    <!-- Header -->
    <header class="header">
        <div class="header-top">
            <h1>Packing Checklist <a href="../../..">mazur.km</a></h1>
            <div class="header-actions">
                <button class="btn" :class="{ 'btn-active': hidePackedMode }" @click="hidePackedMode = !hidePackedMode"
                    x-text="hidePackedMode ? 'show all' : 'hide packed'"></button>
                <button class="btn" @click="copyPacked()" x-text="copyState"></button>
                <button class="btn" @click="clearChecks()">clear</button>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-row">
            <div class="progress-track">
                <div class="progress-fill" :style="`width: ${progressPercent()}%`"></div>
            </div>
            <span class="progress-label" x-text="`${packedCount()}/${totalCount()} packed`"></span>
        </div>
    </header>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <div class="search-row">
            <input class="search-input" type="text" placeholder="search items..."
                x-model="searchQuery" @input.debounce.150ms>
        </div>

        <template x-for="group in tagGroups()" :key="group.label">
            <div class="tag-section">
                <div class="tag-group-label" x-text="group.label"></div>
                <div class="tag-row">
                    <template x-for="tag in group.tags" :key="tag">
                        <button class="tag-pill"
                            :style="isTagActive(tag) ? `border-color: ${tagColor(tag)}; color: ${tagColor(tag)}; background: ${tagColor(tag)}15` : ''"
                            @click="toggleTag(tag)"
                            x-text="tag">
                        </button>
                    </template>
                </div>
            </div>
        </template>

        <div class="filter-status" x-show="hasActiveFilters()">
            <span x-text="`${filteredCount()} items match`"></span>
            <button class="clear-filters" @click="clearFilters()">clear filters</button>
        </div>
    </div>

    <!-- Loading State -->
    <div class="state-msg" x-show="loading">loading checklist...</div>
    <div class="state-msg" x-show="loadError" x-text="loadError"></div>

    <!-- Checklist -->
    <main x-show="!loading && !loadError">
        <div class="state-msg" x-show="filteredGroups().length === 0">
            no items match your filters
        </div>

        <template x-for="group in filteredGroups()" :key="group.label">
            <section class="category-group">
                <div class="category-header" @click="toggleGroup(group.label)">
                    <div class="category-left">
                        <span class="category-chevron" :class="{ collapsed: isGroupCollapsed(group.label) }">&#9660;</span>
                        <span class="category-name" x-text="group.label"></span>
                    </div>
                    <span class="category-count">
                        <span class="category-progress" x-text="groupPackedCount(group.entries)"></span>/<span x-text="group.entries.length"></span>
                    </span>
                </div>

                <ul class="item-list" x-show="!isGroupCollapsed(group.label)" x-transition.opacity>
                    <template x-for="item in group.entries" :key="item.id">
                        <li>
                            <label class="item-row" :class="{ checked: isChecked(item.id) }">
                                <input type="checkbox" :checked="isChecked(item.id)" @change="toggleChecked(item.id)">
                                <div class="item-content">
                                    <div class="item-top">
                                        <span class="item-name" x-text="item.name"></span>
                                        <span class="item-qty" x-show="item.qty" x-text="item.qty"></span>
                                    </div>
                                    <div class="item-note" x-text="item.note" x-show="item.note"></div>
                                    <div class="item-tags" x-show="item.tags.length">
                                        <template x-for="tag in item.tags" :key="tag">
                                            <span class="item-tag" :style="`color: ${tagColor(tag)}`" x-text="tag"></span>
                                        </template>
                                    </div>
                                </div>
                            </label>
                        </li>
                    </template>
                </ul>
            </section>
        </template>
    </main>

    <footer class="footer">
        saved in this browser &middot; <span x-text="`${totalCount()} items`"></span>
    </footer>

</div>
</body>
</html>
